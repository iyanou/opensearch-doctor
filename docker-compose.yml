version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: osd-postgres
    environment:
      POSTGRES_USER: osduser
      POSTGRES_PASSWORD: 7kbXLqhhoXI4mki4UKH0VpYH
      POSTGRES_DB: opensearch_doctor
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osduser -d opensearch_doctor"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: osd-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@123456!
      - plugins.security.disabled=false
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200 -u admin:admin | grep -q opensearch"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  postgres_data:
  opensearch_data:
