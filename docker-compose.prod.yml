version: "3.8"

# Production — PostgreSQL only (OpenSearch runs on the user's own infra)
services:
  postgres:
    image: postgres:16-alpine
    container_name: osd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: osduser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: opensearch_doctor
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osduser -d opensearch_doctor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
