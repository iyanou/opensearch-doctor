<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B82F8"/>
      <stop offset="100%" stop-color="#2D3FC0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle top highlight -->
  <rect width="100" height="52" rx="22" fill="white" opacity="0.06"/>

  <!-- EKG / pulse line: flat → QRS spike → flat -->
  <path
    d="M10,56 L22,56 L27,20 L33,86 L39,56 L49,56"
    fill="none"
    stroke="white"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Magnifying glass lens -->
  <circle
    cx="65" cy="48" r="14"
    fill="none"
    stroke="white"
    stroke-width="6.5"
  />

  <!-- Magnifying glass handle -->
  <line
    x1="75" y1="58"
    x2="86" y2="69"
    stroke="white"
    stroke-width="6.5"
    stroke-linecap="round"
  />
</svg>
