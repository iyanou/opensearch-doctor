<svg viewBox="0 0 300 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B82F8"/>
      <stop offset="100%" stop-color="#2D3FC0"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (72×72, scaled from 100×100 viewBox) -->
  <g transform="translate(0,0) scale(0.72)">
    <rect width="100" height="100" rx="22" fill="url(#bg)"/>
    <rect width="100" height="52" rx="22" fill="white" opacity="0.06"/>
    <path
      d="M10,56 L22,56 L27,20 L33,86 L39,56 L49,56"
      fill="none"
      stroke="white"
      stroke-width="6.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="65" cy="48" r="14" fill="none" stroke="white" stroke-width="6.5"/>
    <line x1="75" y1="58" x2="86" y2="69" stroke="white" stroke-width="6.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <!-- "OpenSearch" — bold -->
  <text
    x="84" y="30"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif"
    font-size="21"
    font-weight="700"
    letter-spacing="-0.4"
    fill="#1E293B"
  >OpenSearch</text>

  <!-- "Doctor" — light weight, primary color -->
  <text
    x="84" y="54"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif"
    font-size="21"
    font-weight="400"
    letter-spacing="-0.4"
    fill="#4361EE"
  >Doctor</text>
</svg>
